<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylNet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cyan:#00ffe7;--magenta:#ff00c8;--yellow:#ffe600;
  --dark:#0a0010;--darker:#050008;--panel:#0d0020;--panel2:#110028;
  --border:#2a0060;--text:#e0d0ff;--dim:#7055aa;
}
html,body{height:100%;background:var(--darker);font-family:'Share Tech Mono',monospace;color:var(--text);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* TITLEBAR DRAG AREA */
#titlebar{height:38px;-webkit-app-region:drag;background:var(--darker);display:flex;align-items:center;justify-content:center;flex-shrink:0;border-bottom:1px solid var(--border);}
#titlebar .logo{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;color:var(--cyan);letter-spacing:6px;-webkit-app-region:no-drag;}
#titlebar .logo span{color:var(--magenta);}

#app{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}
#bg-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.scanlines{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);z-index:1;}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:2;}

/* MAIN LAYOUT */
.main-grid{flex:1;display:grid;grid-template-columns:280px 1fr;overflow:hidden;}

/* SIDEBAR */
#sidebar{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:12px;border-bottom:1px solid var(--border);}
.panel-label{font-size:9px;letter-spacing:2px;color:var(--dim);margin-bottom:8px;font-family:'Orbitron',monospace;}
.cbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:7px 12px;cursor:pointer;border-radius:2px;transition:all 0.1s;white-space:nowrap;width:100%;}
.cbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.cbtn.active{border-color:var(--magenta);color:var(--magenta);}
.folder-path{font-size:9px;color:var(--dim);margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-wrap{padding:8px 12px;border-bottom:1px solid var(--border);position:relative;}
#search{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 28px 6px 8px;border-radius:2px;outline:none;transition:border-color 0.1s;}
#search::placeholder{color:var(--dim);}
#search:focus{border-color:var(--cyan);}
.search-clear{position:absolute;right:18px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;padding:0;line-height:1;display:none;}
.search-clear:hover{color:var(--cyan);}

#queue-wrap{flex:1;overflow-y:auto;padding:8px;}
#queue-wrap::-webkit-scrollbar{width:3px;}
#queue-wrap::-webkit-scrollbar-track{background:var(--panel);}
#queue-wrap::-webkit-scrollbar-thumb{background:var(--border);}
#queue-list{list-style:none;display:flex;flex-direction:column;gap:2px;}
#queue-list li{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1px solid transparent;border-radius:2px;cursor:pointer;font-size:10px;color:var(--dim);transition:all 0.1s;}
#queue-list li:hover{border-color:var(--border);color:var(--text);}
#queue-list li.active{border-color:var(--magenta);color:var(--magenta);}
#queue-list li .qnum{font-size:8px;color:var(--border);min-width:18px;}
#queue-list li .qname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#queue-list li .qdur{font-size:8px;color:var(--border);}
.empty-q{font-size:10px;color:var(--border);text-align:center;padding:30px 0;letter-spacing:2px;line-height:1.8;}

/* PLAYER AREA */
#player{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px;overflow:hidden;}

.platter-area{position:relative;width:220px;height:220px;flex-shrink:0;}
#record-svg{width:220px;height:220px;cursor:pointer;display:block;}
.tonearm-svg{position:absolute;top:10px;right:-12px;width:65px;height:110px;pointer-events:none;}
#tonearm{transform-origin:56px 8px;transform:rotate(-18deg);transition:transform 0.8s ease;}
#tonearm.playing{transform:rotate(0deg);}

#track-name{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--cyan);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px;}
#track-sub{font-size:10px;color:var(--dim);text-align:center;}

.time-row{display:flex;justify-content:space-between;width:100%;max-width:400px;font-size:10px;color:var(--dim);}
#seek{width:100%;max-width:400px;cursor:pointer;accent-color:var(--cyan);}

.controls{display:flex;align-items:center;justify-content:center;gap:8px;}
.ctrl{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;padding:7px 14px;cursor:pointer;border-radius:2px;transition:all 0.1s;}
.ctrl:hover{border-color:var(--cyan);color:var(--cyan);}
.ctrl.active{border-color:var(--magenta);color:var(--magenta);}
.ctrl.play{border-color:var(--cyan);color:var(--cyan);font-size:18px;padding:7px 20px;}
.ctrl.play:hover{background:var(--cyan);color:var(--dark);}

.vol-row{display:flex;align-items:center;gap:10px;width:100%;max-width:400px;font-size:10px;color:var(--dim);}
.vol-row input{flex:1;accent-color:var(--magenta);}

#viz-row{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:32px;width:100%;max-width:400px;}
.vdot{width:5px;background:var(--cyan);border-radius:1px;transition:height 0.07s;}

/* STATUS BAR */
#statusbar{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;background:var(--panel);border-top:1px solid var(--border);font-size:9px;color:var(--dim);letter-spacing:1px;flex-shrink:0;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--border);display:inline-block;margin-right:5px;}
.sdot.on{background:var(--cyan);}
</style>
</head>
<body>

<div id="titlebar">
  <div class="logo">VINYL<span>NET</span></div>
</div>

<div id="app">
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="content">
    <div class="main-grid">

      <div id="sidebar">
        <div class="sidebar-top">
          <div class="panel-label">// music library</div>
          <button class="cbtn" id="btn-folder">+ open music folder</button>
          <div class="folder-path" id="folder-path">no folder loaded</div>
        </div>
        <div class="search-wrap">
          <input id="search" type="text" placeholder="SEARCH TRACKS..." autocomplete="off" spellcheck="false">
          <button class="search-clear" id="search-clear" title="clear">&#x2715;</button>
        </div>
        <div style="padding:8px 12px 4px;"><div class="panel-label">// queue — <span id="track-count">0 tracks</span></div></div>
        <div id="queue-wrap">
          <ul id="queue-list">
            <li><div class="empty-q">NO TRACKS LOADED<br>open a music folder<br>to get started</div></li>
          </ul>
        </div>
      </div>

      <div id="player">
        <div class="platter-area">
          <svg id="record-svg" viewBox="0 0 220 220" onclick="togglePlay()">
            <defs>
              <radialGradient id="rg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#1a003a"/>
                <stop offset="45%" stop-color="#0a0018"/>
                <stop offset="100%" stop-color="#050008"/>
              </radialGradient>
            </defs>
            <circle cx="110" cy="110" r="106" fill="url(#rg)" stroke="#2a0060" stroke-width="1"/>
            <circle cx="110" cy="110" r="99" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="90" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="81" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="72" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="63" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="54" fill="none" stroke="#220055" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="45" fill="none" stroke="#330066" stroke-width="0.8"/>
            <circle cx="110" cy="110" r="36" fill="none" stroke="#330066" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="30" fill="#0d0020" stroke="#440088" stroke-width="1"/>
            <circle cx="110" cy="110" r="24" fill="#0a0018" stroke="#00ffe7" stroke-width="0.8" opacity="0.6"/>
            <circle cx="110" cy="110" r="7" fill="#00ffe7" opacity="0.8"/>
            <circle cx="110" cy="110" r="3.5" fill="#ff00c8"/>
            <g id="record-grooves" transform="rotate(0 110 110)">
              <line x1="110" y1="4" x2="110" y2="34" stroke="#00ffe7" stroke-width="1" opacity="0.25"/>
              <line x1="110" y1="186" x2="110" y2="216" stroke="#00ffe7" stroke-width="1" opacity="0.25"/>
              <line x1="4" y1="110" x2="34" y2="110" stroke="#ff00c8" stroke-width="1" opacity="0.25"/>
              <line x1="186" y1="110" x2="216" y2="110" stroke="#ff00c8" stroke-width="1" opacity="0.25"/>
              <line x1="30" y1="30" x2="52" y2="52" stroke="#ffe600" stroke-width="1" opacity="0.15"/>
              <line x1="168" y1="168" x2="190" y2="190" stroke="#ffe600" stroke-width="1" opacity="0.15"/>
            </g>
          </svg>
          <svg class="tonearm-svg" viewBox="0 0 65 110">
            <g id="tonearm">
              <line x1="56" y1="8" x2="22" y2="94" stroke="#777" stroke-width="3" stroke-linecap="round"/>
              <circle cx="56" cy="8" r="6" fill="#333" stroke="#555" stroke-width="1"/>
              <rect x="16" y="90" width="12" height="7" rx="1" fill="#444" stroke="#00ffe7" stroke-width="0.5"/>
              <line x1="22" y1="95" x2="17" y2="104" stroke="#777" stroke-width="2"/>
              <rect x="13" y="103" width="8" height="4" rx="1" fill="#00ffe7" opacity="0.9"/>
            </g>
          </svg>
        </div>

        <div id="viz-row"></div>

        <div id="track-name">NO SIGNAL</div>
        <div id="track-sub">open a folder to load your music</div>

        <div class="time-row"><span id="cur">0:00</span><span id="dur">0:00</span></div>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1">

        <div class="controls">
          <button class="ctrl" id="btn-prev">|&lt;</button>
          <button class="ctrl play" id="btn-play">&#9654;</button>
          <button class="ctrl" id="btn-next">&gt;|</button>
          <button class="ctrl" id="btn-shuf">SHUF</button>
          <button class="ctrl" id="btn-loop">LOOP</button>
        </div>

        <div class="vol-row">
          <span>VOL</span>
          <input type="range" id="vol" min="0" max="100" value="80" step="1">
          <span id="vol-out">80%</span>
        </div>
      </div>

    </div>

    <div id="statusbar">
      <span><span class="sdot" id="sdot"></span><span id="stxt">STANDBY</span></span>
      <span id="strack"></span>
      <span>VINYLNET v2.0K</span>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio')
const btnFolder = document.getElementById('btn-folder')
const btnPlay = document.getElementById('btn-play')
const btnPrev = document.getElementById('btn-prev')
const btnNext = document.getElementById('btn-next')
const btnShuf = document.getElementById('btn-shuf')
const btnLoop = document.getElementById('btn-loop')
const seek = document.getElementById('seek')
const curEl = document.getElementById('cur')
const durEl = document.getElementById('dur')
const volSlider = document.getElementById('vol')
const volOut = document.getElementById('vol-out')
const queueList = document.getElementById('queue-list')
const trackName = document.getElementById('track-name')
const trackSub = document.getElementById('track-sub')
const tonearm = document.getElementById('tonearm')
const grooves = document.getElementById('record-grooves')
const sdot = document.getElementById('sdot')
const stxt = document.getElementById('stxt')
const strack = document.getElementById('strack')
const trackCount = document.getElementById('track-count')
const folderPath = document.getElementById('folder-path')
const vizRow = document.getElementById('viz-row')
const searchEl = document.getElementById('search')
const searchClear = document.getElementById('search-clear')

let tracks = [], cur = -1, shuffle = false, loop = false
let rotAngle = 0, rotFrame = null
let vizBars = [], audioCtx = null, analyser = null, source = null

for (let i = 0; i < 28; i++) {
  const d = document.createElement('div')
  d.className = 'vdot'
  d.style.height = '4px'
  vizRow.appendChild(d)
  vizBars.push(d)
}

function fmt(s) {
  if (isNaN(s) || s === Infinity) return '0:00'
  return Math.floor(s / 60) + ':' + (Math.floor(s % 60) < 10 ? '0' : '') + Math.floor(s % 60)
}

function clean(n) { return n.replace(/\.[^/.]+$/, '') }

function setupAudio() {
  if (audioCtx) return
  audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  analyser = audioCtx.createAnalyser()
  analyser.fftSize = 64
  source = audioCtx.createMediaElementSource(audio)
  source.connect(analyser)
  analyser.connect(audioCtx.destination)
}

function animViz() {
  if (!analyser) { vizBars.forEach(b => b.style.height = '4px'); return }
  const data = new Uint8Array(analyser.frequencyBinCount)
  analyser.getByteFrequencyData(data)
  const n = vizBars.length
  for (let i = 0; i < n; i++) {
    const v = data[Math.floor(i * data.length / n)]
    vizBars[i].style.height = Math.max(4, Math.round(v / 255 * 28)) + 'px'
    vizBars[i].style.background = i < n / 2 ? '#00ffe7' : '#ff00c8'
  }
  requestAnimationFrame(animViz)
}

function rotateRecord() {
  rotAngle = (rotAngle + 1.2) % 360
  if (grooves) grooves.setAttribute('transform', `rotate(${rotAngle} 110 110)`)
  rotFrame = requestAnimationFrame(rotateRecord)
}

function stopRotate() { cancelAnimationFrame(rotFrame); rotFrame = null }

function setPlaying(playing) {
  btnPlay.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;'
  if (playing) { tonearm.classList.add('playing'); sdot.classList.add('on'); stxt.textContent = 'PLAYING'; if (!rotFrame) rotateRecord(); animViz() }
  else { tonearm.classList.remove('playing'); sdot.classList.remove('on'); stxt.textContent = 'PAUSED'; stopRotate(); vizBars.forEach(b => b.style.height = '4px') }
}

function loadTrack(i) {
  if (i < 0 || i >= tracks.length) return
  cur = i
  const t = tracks[i]
  audio.src = t.url
  trackName.textContent = clean(t.name).toUpperCase()
  trackSub.textContent = t.name
  strack.textContent = clean(t.name).toUpperCase()
  audio.load()
  audio.play().then(() => { setupAudio(); if (audioCtx.state === 'suspended') audioCtx.resume() }).catch(() => {})
  setPlaying(true)
  renderQueue()
  savePrefs()
}

function togglePlay() {
  if (!tracks.length) return
  if (cur === -1) { loadTrack(0); return }
  if (audio.paused) { audio.play().then(() => { setupAudio(); if (audioCtx.state === 'suspended') audioCtx.resume() }).catch(() => {}); setPlaying(true) }
  else { audio.pause(); setPlaying(false) }
}

function nextTrack() {
  if (!tracks.length) return
  loadTrack(shuffle ? Math.floor(Math.random() * tracks.length) : (cur + 1) % tracks.length)
}

function prevTrack() {
  if (!tracks.length) return
  if (audio.currentTime > 3) { audio.currentTime = 0; return }
  loadTrack((cur - 1 + tracks.length) % tracks.length)
}

function renderQueue() {
  if (!tracks.length) {
    queueList.innerHTML = '<li><div class="empty-q">NO TRACKS LOADED<br>open a music folder<br>to get started</div></li>'
    return
  }
  queueList.innerHTML = ''
  tracks.forEach((t, i) => {
    const li = document.createElement('li')
    if (i === cur) li.classList.add('active')
    li.dataset.idx = i
    li.dataset.name = clean(t.name).toLowerCase()
    li.innerHTML = `<span class="qnum">${String(i + 1).padStart(2, '0')}</span><span class="qname">${clean(t.name).toUpperCase()}</span><span class="qdur" id="qd${i}">--:--</span>`
    li.onclick = () => loadTrack(i)
    queueList.appendChild(li)
    const tmp = new Audio(); tmp.src = t.url
    tmp.addEventListener('loadedmetadata', () => { const el = document.getElementById('qd' + i); if (el) el.textContent = fmt(tmp.duration) })
  })
  trackCount.textContent = tracks.length + ' track' + (tracks.length !== 1 ? 's' : '')
  applySearch()
}

function applySearch() {
  const q = searchEl.value.trim().toLowerCase()
  searchClear.style.display = q ? 'block' : 'none'
  const items = queueList.querySelectorAll('li[data-idx]')
  items.forEach(li => {
    li.style.display = !q || li.dataset.name.includes(q) ? '' : 'none'
  })
}

searchEl.addEventListener('input', applySearch)
searchClear.addEventListener('click', () => { searchEl.value = ''; applySearch(); searchEl.focus() })

async function savePrefs() {
  if (!window.vinylnet) return
  await window.vinylnet.savePrefs({
    folderPath: folderPath.textContent === 'no folder loaded' ? null : folderPath.textContent,
    currentIndex: cur,
    volume: audio.volume,
    shuffle, loop
  })
}

async function loadPrefs() {
  if (!window.vinylnet) return
  const prefs = await window.vinylnet.loadPrefs()
  if (!prefs) return
  if (prefs.volume !== undefined) { audio.volume = prefs.volume; volSlider.value = Math.round(prefs.volume * 100); volOut.textContent = Math.round(prefs.volume * 100) + '%' }
  if (prefs.shuffle) { shuffle = true; btnShuf.classList.add('active') }
  if (prefs.loop) { loop = true; audio.loop = true; btnLoop.classList.add('active') }
  if (prefs.folderPath) {
    folderPath.textContent = prefs.folderPath
    const scanned = await window.vinylnet.scanFolder(prefs.folderPath)
    if (scanned && scanned.length) {
      tracks = scanned
      renderQueue()
      if (prefs.currentIndex >= 0 && prefs.currentIndex < tracks.length) {
        cur = prefs.currentIndex
        const t = tracks[cur]
        audio.src = t.url
        trackName.textContent = clean(t.name).toUpperCase()
        trackSub.textContent = t.name
        strack.textContent = clean(t.name).toUpperCase()
        renderQueue()
      }
    }
  }
}

btnFolder.addEventListener('click', async () => {
  if (!window.vinylnet) return
  const folder = await window.vinylnet.openFolder()
  if (!folder) return
  folderPath.textContent = folder
  stxt.textContent = 'SCANNING...'
  const scanned = await window.vinylnet.scanFolder(folder)
  tracks = scanned || []
  cur = -1
  renderQueue()
  stxt.textContent = tracks.length ? 'READY' : 'NO AUDIO FILES FOUND'
  if (tracks.length) loadTrack(0)
  savePrefs()
})

btnPlay.addEventListener('click', togglePlay)
btnPrev.addEventListener('click', prevTrack)
btnNext.addEventListener('click', nextTrack)
btnShuf.addEventListener('click', () => { shuffle = !shuffle; btnShuf.classList.toggle('active', shuffle); savePrefs() })
btnLoop.addEventListener('click', () => { loop = !loop; audio.loop = loop; btnLoop.classList.toggle('active', loop); savePrefs() })

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return
  seek.value = (audio.currentTime / audio.duration * 100).toFixed(1)
  curEl.textContent = fmt(audio.currentTime)
})
audio.addEventListener('loadedmetadata', () => { durEl.textContent = fmt(audio.duration) })
audio.addEventListener('ended', () => { if (!loop) nextTrack() })
seek.addEventListener('input', () => { if (audio.duration) audio.currentTime = seek.value / 100 * audio.duration })
volSlider.addEventListener('input', () => { audio.volume = volSlider.value / 100; volOut.textContent = volSlider.value + '%'; savePrefs() })

audio.volume = 0.8
loadPrefs()

// ─── BACKGROUND CANVAS ───────────────────────────────────────────────────────
;(function() {
  const c = document.getElementById('bg-canvas')
  const cx = c.getContext('2d')

  function resize() { c.width = c.offsetWidth; c.height = c.offsetHeight }
  resize()
  window.addEventListener('resize', resize)

  // Stars
  const STARS = Array.from({length: 140}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.4 + 0.3,
    spd: Math.random() * 0.00012 + 0.00003,
    bright: Math.random() * 0.55 + 0.15,
    col: ['#00ffe7','#00ffe7','#ff00c8','#ffffff','#ffe600'][Math.floor(Math.random()*5)]
  }))

  // Data streams (vertical neon trails)
  const STREAMS = Array.from({length: 10}, () => ({
    x: Math.random(),
    y: Math.random() * 2 - 1,
    spd: Math.random() * 0.0025 + 0.0008,
    len: Math.random() * 0.18 + 0.06,
    col: Math.random() < 0.6 ? '#00ffe7' : '#ff00c8',
    alpha: Math.random() * 0.35 + 0.08
  }))

  // Floating geometric shapes (cyberdeck debris)
  const SHAPES = Array.from({length: 9}, () => ({
    x: Math.random(), y: Math.random(),
    sz: Math.random() * 28 + 12,
    sides: [3,4,6,6][Math.floor(Math.random()*4)],
    rot: Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.006,
    vx: (Math.random() - 0.5) * 0.00025,
    vy: (Math.random() - 0.5) * 0.00025,
    col: ['#00ffe7','#ff00c8','#ffe600','#aa00ff'][Math.floor(Math.random()*4)],
    alpha: Math.random() * 0.12 + 0.04
  }))

  // Nebula blobs
  const NEBULAE = Array.from({length: 4}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 180 + 80,
    col: Math.random() < 0.5 ? '0,255,231' : '255,0,200',
    pulse: Math.random() * Math.PI * 2,
    pulseSpd: Math.random() * 0.008 + 0.003
  }))

  let gridOff = 0

  function poly(x, y, r, n, rot) {
    cx.beginPath()
    for (let i = 0; i < n; i++) {
      const a = rot + (i / n) * Math.PI * 2
      i === 0 ? cx.moveTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
               : cx.lineTo(x + Math.cos(a)*r, y + Math.sin(a)*r)
    }
    cx.closePath()
  }

  function frame() {
    const W = c.width, H = c.height
    cx.clearRect(0, 0, W, H)

    // ── Nebula glow ──
    NEBULAE.forEach(n => {
      n.pulse += n.pulseSpd
      const alpha = (Math.sin(n.pulse) * 0.03 + 0.05).toFixed(3)
      const g = cx.createRadialGradient(n.x*W, n.y*H, 0, n.x*W, n.y*H, n.r)
      g.addColorStop(0, `rgba(${n.col},${alpha})`)
      g.addColorStop(1, 'transparent')
      cx.fillStyle = g
      cx.fillRect(0, 0, W, H)
    })

    // ── Stars ──
    STARS.forEach(s => {
      s.y += s.spd
      if (s.y > 1) { s.y = 0; s.x = Math.random() }
      cx.beginPath()
      cx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2)
      cx.fillStyle = s.col
      cx.globalAlpha = s.bright
      cx.fill()
    })
    cx.globalAlpha = 1

    // ── Perspective grid (lower 50%) ──
    const gTop = H * 0.5, gBot = H
    const vx = W * 0.5, vy = gTop
    gridOff = (gridOff + 0.5) % (H * 0.08)

    // horizontal lines
    for (let i = 0; i <= 10; i++) {
      const t = i / 10
      const rawY = gTop + t * (gBot - gTop)
      const y = rawY + gridOff * (t * 1.5)
      if (y > gBot) continue
      const spread = 0.08 + t * 0.92
      cx.strokeStyle = `rgba(42,0,96,${t * 0.7})`
      cx.lineWidth = 0.5
      cx.beginPath()
      cx.moveTo(vx - W * spread, y)
      cx.lineTo(vx + W * spread, y)
      cx.stroke()
      // cyan horizon flash on the topmost visible line
      if (i === 1) {
        cx.strokeStyle = `rgba(0,255,231,${t * 0.25})`
        cx.lineWidth = 0.5
        cx.beginPath(); cx.moveTo(vx - W * spread, y); cx.lineTo(vx + W * spread, y); cx.stroke()
      }
    }
    // converging verticals
    const cols = 14
    for (let i = 0; i <= cols; i++) {
      const t = i / cols
      const bx = W * t
      cx.strokeStyle = `rgba(42,0,96,0.35)`
      cx.lineWidth = 0.5
      cx.beginPath(); cx.moveTo(vx, vy); cx.lineTo(bx, gBot); cx.stroke()
    }

    // ── Data streams ──
    STREAMS.forEach(s => {
      s.y += s.spd
      if (s.y - s.len > 1) { s.y = -s.len; s.x = Math.random() }
      const sx = s.x * W
      const sy1 = (s.y - s.len) * H, sy2 = s.y * H
      const gr = cx.createLinearGradient(sx, sy1, sx, sy2)
      gr.addColorStop(0, 'transparent')
      gr.addColorStop(0.6, s.col.replace(')', `,${s.alpha * 0.4})`).replace('rgb', 'rgba'))
      gr.addColorStop(1, s.col)
      cx.strokeStyle = gr
      cx.globalAlpha = s.alpha
      cx.lineWidth = 1
      cx.beginPath(); cx.moveTo(sx, sy1); cx.lineTo(sx, sy2); cx.stroke()
    })
    cx.globalAlpha = 1

    // ── Floating shapes ──
    SHAPES.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.rot += s.rotSpd
      if (s.x < -0.15) s.x = 1.15
      if (s.x > 1.15)  s.x = -0.15
      if (s.y < -0.15) s.y = 1.15
      if (s.y > 1.15)  s.y = -0.15
      cx.strokeStyle = s.col
      cx.lineWidth = 0.8
      cx.globalAlpha = s.alpha
      poly(s.x * W, s.y * H, s.sz, s.sides, s.rot)
      cx.stroke()
      // inner shape (double-ring on hexagons)
      if (s.sides === 6) {
        cx.globalAlpha = s.alpha * 0.5
        poly(s.x * W, s.y * H, s.sz * 0.55, s.sides, s.rot + Math.PI/6)
        cx.stroke()
      }
    })
    cx.globalAlpha = 1

    requestAnimationFrame(frame)
  }

  requestAnimationFrame(frame)
})()
</script>
</body>
</html>
