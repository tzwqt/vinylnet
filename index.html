<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinylNet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titlebar">
  <div class="logo">VINYL<span>NET</span></div>
</div>

<div id="app">
  <canvas id="bg-canvas"></canvas>
  <div class="scanlines"></div>
  <div class="content">
    <div class="main-grid">

      <div id="sidebar">
        <div class="sidebar-top">
          <div class="panel-label">// music library</div>
          <button class="cbtn" id="btn-folder">+ open music folder</button>
          <div class="folder-path" id="folder-path">no folder loaded</div>
        </div>
        <div class="search-wrap">
          <input id="search" type="text" placeholder="SEARCH TRACKS..." autocomplete="off" spellcheck="false">
          <button class="search-clear" id="search-clear" title="clear">&#x2715;</button>
        </div>
        <div style="padding:8px 12px 4px;"><div class="panel-label">// queue — <span id="track-count">0 tracks</span></div></div>
        <div id="queue-wrap">
          <ul id="queue-list">
            <li><div class="empty-q">NO TRACKS LOADED<br>open a music folder<br>to get started</div></li>
          </ul>
        </div>
      </div>

      <div id="player">
        <div class="platter-area">
          <canvas id="record-canvas"></canvas>
          <svg id="record-svg" viewBox="0 0 220 220" onclick="togglePlay()">
            <defs>
              <radialGradient id="rg" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#1a003a"/>
                <stop offset="45%" stop-color="#0a0018"/>
                <stop offset="100%" stop-color="#050008"/>
              </radialGradient>
            </defs>
            <circle cx="110" cy="110" r="106" fill="url(#rg)" stroke="#2a0060" stroke-width="1"/>
            <circle cx="110" cy="110" r="99" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="90" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="81" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="72" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="63" fill="none" stroke="#1a0040" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="54" fill="none" stroke="#220055" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="45" fill="none" stroke="#330066" stroke-width="0.8"/>
            <circle cx="110" cy="110" r="36" fill="none" stroke="#330066" stroke-width="0.5"/>
            <circle cx="110" cy="110" r="30" fill="#0d0020" stroke="#440088" stroke-width="1"/>
            <circle cx="110" cy="110" r="24" fill="#0a0018" stroke="#00ffe7" stroke-width="0.8" opacity="0.6"/>
            <circle cx="110" cy="110" r="7" fill="#00ffe7" opacity="0.8"/>
            <circle cx="110" cy="110" r="3.5" fill="#ff00c8"/>
            <g id="record-grooves" transform="rotate(0 110 110)">
              <line x1="110" y1="4" x2="110" y2="34" stroke="#00ffe7" stroke-width="1" opacity="0.25"/>
              <line x1="110" y1="186" x2="110" y2="216" stroke="#00ffe7" stroke-width="1" opacity="0.25"/>
              <line x1="4" y1="110" x2="34" y2="110" stroke="#ff00c8" stroke-width="1" opacity="0.25"/>
              <line x1="186" y1="110" x2="216" y2="110" stroke="#ff00c8" stroke-width="1" opacity="0.25"/>
              <line x1="30" y1="30" x2="52" y2="52" stroke="#ffe600" stroke-width="1" opacity="0.15"/>
              <line x1="168" y1="168" x2="190" y2="190" stroke="#ffe600" stroke-width="1" opacity="0.15"/>
            </g>
          </svg>
          <svg class="tonearm-svg" viewBox="0 0 65 110">
            <g id="tonearm">
              <line x1="56" y1="8" x2="22" y2="94" stroke="#777" stroke-width="3" stroke-linecap="round"/>
              <circle cx="56" cy="8" r="6" fill="#333" stroke="#555" stroke-width="1"/>
              <rect x="16" y="90" width="12" height="7" rx="1" fill="#444" stroke="#00ffe7" stroke-width="0.5"/>
              <line x1="22" y1="95" x2="17" y2="104" stroke="#777" stroke-width="2"/>
              <rect x="13" y="103" width="8" height="4" rx="1" fill="#00ffe7" opacity="0.9"/>
            </g>
          </svg>
          <div class="hud-corners"><i></i><i></i><i></i><i></i></div>
        </div>

        <div class="hud-data">
          <span>RPM <b class="hv">33.3</b></span>
          <span id="hud-sync">SYNC <b class="hv hv-dim">——</b></span>
          <span>CH <b class="hv">STEREO</b></span>
          <span>BIT <b class="hv">16</b></span>
        </div>

        <div id="viz-row"></div>

        <div id="track-name">NO SIGNAL</div>
        <div id="track-sub">open a folder to load your music</div>

        <div class="time-row"><span id="cur">0:00</span><span id="dur">0:00</span></div>
        <input type="range" id="seek" min="0" max="100" value="0" step="0.1">

        <div class="controls">
          <button class="ctrl" id="btn-prev">|&lt;</button>
          <button class="ctrl play" id="btn-play">&#9654;</button>
          <button class="ctrl" id="btn-next">&gt;|</button>
          <button class="ctrl" id="btn-shuf">SHUF</button>
          <button class="ctrl" id="btn-loop">LOOP</button>
        </div>

        <div class="vol-row">
          <span>VOL</span>
          <input type="range" id="vol" min="0" max="100" value="80" step="1">
          <span id="vol-out">80%</span>
        </div>
      </div>

    </div>

    <div id="statusbar">
      <span><span class="sdot" id="sdot"></span><span id="stxt">STANDBY</span></span>
      <span id="strack"></span>
      <span>VINYLNET v2.0K</span>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script src="renderer.js"></script>
</body>
</html>
